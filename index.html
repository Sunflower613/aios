            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
            gap: 8px;

            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: system-ui, -apple-system, sans-serif;
            animation: float-btn 3s ease-in-out infinite;
        }
        .mode-3d-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
            animation-play-state: paused;
            transform: translateY(-4px) scale(1.03);
        }
        .mode-3d-btn:active {
            transform: translateY(0) scale(0.98);
        }
        @keyframes float-btn {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        /* SSO 登录/用户浮窗样式 */
        .sso-profile-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 6px 14px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        .sso-profile-bar:hover {
            background: rgba(0, 0, 0, 0.4);

        }
        .sso-login-btn {

            align-items: center;

            color: #fff;

            cursor: pointer;
            text-decoration: none;
            background: none;
            border: none;
            outline: none;
            font-size: 13px;
            transition: opacity 0.2s ease;
        }
        .sso-login-btn:hover {
            opacity: 0.85;
        }
        .sso-user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sso-avatar {
            width: 22px;

            border-radius: 50%;

        .sso-username {
            font-weight: 600;

        .sso-logout-btn {

            background: rgba(255, 107, 129, 0.25);
            color: #ff6b81;
            border-color: rgba(255, 107, 129, 0.4);
        }

    </style>
</head>

    <script>
        window.onload = startSakura;

        // 禁用移动端左滑/右滑返回/前进手势 (防止边缘滑动触发浏览器历史记录导航)
        document.addEventListener('touchstart', (e) => {
            if (e.touches && e.touches.length > 0) {
                const x = e.touches[0].clientX;
                // 当触摸起点在屏幕左右边缘 40px 以内时，标记为可能触发导航的滑动
                if (x < 40 || x > window.innerWidth - 40) {
                    e.currentTarget.preventSwipeNavigation = true;
                } else {
                    e.currentTarget.preventSwipeNavigation = false;
                }
            }
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (e.currentTarget.preventSwipeNavigation) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>

    <!-- Dynamic Site Configuration Integration -->
    <script type="module">
        import { siteConfig } from './site-config.js?v=3';

        // 1. Dynamic Mode-3D navigation helper
        const btn3d = document.getElementById('btn-mode-3d');
        if (btn3d) {
            btn3d.addEventListener('click', (e) => {
                e.preventDefault();
                const devPort = 3000;
                // If local development, redirect to local dev port on the same hostname. Otherwise, redirect to build path
                const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const targetUrl = isLocal ? `http://${window.location.hostname}:${devPort}/` : './3d-home/dist/index.html';
                window.location.href = targetUrl;
            });
        }

        // Adjust toggle button theme based on active siteConfig theme
        if (siteConfig.activeTheme === 'christmas') {
            const btnIcon = btn3d.querySelector('.btn-icon');
            const btnText = btn3d.querySelector('.btn-text');
            if (btnIcon) btnIcon.textContent = '❄️';
            if (btnText) btnText.textContent = '3D 圣诞雪景';
        }

        // 2. Hydrate Developer Info if available
        if (siteConfig.developer) {
            const dev = siteConfig.developer;
            // Update page description and greeting
            const subtitleEl = document.querySelector('header p');
            if (subtitleEl) subtitleEl.textContent = dev.bio.split('。')[0] + '。';
            
            // Map dynamic contacts
            const nav = document.querySelector('header nav');
            if (nav && dev.contacts) {
                nav.innerHTML = '';
                dev.contacts.forEach(contact => {
                    const a = document.createElement('a');
                    a.textContent = contact.name;
                    if (contact.action === 'link') {
                        a.href = contact.value;
                        if (contact.name === '我的课表') {
                            a.title = '课表';
                        } else if (contact.name === '备忘清单') {
                            a.title = '备忘清单';
                        }
                    } else if (contact.action === 'alert') {
                        a.href = '#';
                        a.onclick = (e) => {
                            e.preventDefault();
                            alert(contact.value);
                        };
                    } else if (contact.action === 'confirm') {
                        a.href = '#';
                        a.onclick = (e) => {
                            e.preventDefault();
                            confirm(contact.value);
                        };
                    }
                    nav.appendChild(a);
                });
            }
        }

        // 3. Hydrate Games Box ("韭菜盒子") dynamically
        const boxContainer = document.querySelector('.box');
        if (boxContainer && siteConfig.games) {
            // Clear current list to rebuild from site-config
            boxContainer.innerHTML = '';
            siteConfig.games.forEach(game => {
                const a = document.createElement('a');
                a.className = 'game-button';
                if (game.id === '21dian') {
                    const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                    a.href = isLocal ? `http://${window.location.hostname}:8080/games/21dian/index.html` : game.path;
                } else {
                    a.href = game.path;
                }
                a.style.backgroundImage = `url('${game.icon}')`;
                if (game.icon.startsWith('data:image/svg+xml')) {
                    a.style.backgroundSize = '28px 28px';
                }
                if (game.color) {
                    a.style.backgroundColor = game.color;
                }
                
                const span = document.createElement('span');
                span.textContent = game.name;
                a.appendChild(span);
                
                // 点击时自动携带当前登录态（如果主页已登录）
                a.addEventListener('click', (e) => {
                    const token = localStorage.getItem('sso_access_token');
                    const user = localStorage.getItem('sso_user');
                    if (token && user) {
                        e.preventDefault();
                        try {
                            const urlObj = new URL(a.href, window.location.href);
                            urlObj.searchParams.set('sso_access_token', token);
                            urlObj.searchParams.set('sso_user', user);
                            window.location.href = urlObj.toString();
                        } catch (err) {
                            window.location.href = a.href;
                        }
                    }
                });

                boxContainer.appendChild(a);
            });
        }

        // ==========================================
        // SSO 统一登录整合模块
        // ==========================================
        
        // 配置本地 API 网关地址 (对接 game-api 服务)
        const apiHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
          ? `http://${window.location.hostname}:3001`
          : 'http://111.229.107.228:3001';

        // 自动检查 URL Query 中的 sso_return_url 中转传参
        const initUrlParams = new URLSearchParams(window.location.search);
        const queryReturnUrl = initUrlParams.get('sso_return_url');
        if (queryReturnUrl) {
          localStorage.setItem('sso_return_url', queryReturnUrl);
          const token = localStorage.getItem('sso_access_token');
          if (!token) {
            // 如果没有登录，自动触发 SSO 重定向，免去用户手动点击
            triggerAutoSSOLogin();
          } else {
            // 如果已经登录，直接跳回 returnUrl 并在跨域时带上 token 信息！
            localStorage.removeItem('sso_return_url');
            try {
              const urlObj = new URL(queryReturnUrl, window.location.href);
              const user = localStorage.getItem('sso_user');
              urlObj.searchParams.set('sso_access_token', token);
              if (user) {
                urlObj.searchParams.set('sso_user', user);
              }
              window.location.href = urlObj.toString();
            } catch (e) {
              window.location.href = queryReturnUrl;
            }
          }
        }

        async function triggerAutoSSOLogin() {
          try {
            const res = await fetch(`${apiHost}/api/auth/config`);
            const config = await res.json();
            if (config && config.success) {
              const state = Math.random().toString(36).substring(2, 15);
              localStorage.setItem('sso_oauth_state', state);
              // 动态生成匹配当前域名和端口的回调地址
              const currentRedirectUri = window.location.origin + window.location.pathname;
              const authUrl = `${config.authorize_url}?client_id=${config.client_id}&redirect_uri=${encodeURIComponent(currentRedirectUri)}&response_type=code&scope=openid profile email&state=${state}`;
              window.location.href = authUrl;
            }
          } catch (err) {
            console.error('自动 SSO 登录中转失败:', err);
          }
        }

        const ssoLoginBtn = document.getElementById('sso-login-btn');
        const ssoUserInfo = document.getElementById('sso-user-info');
        const ssoAvatar = document.getElementById('sso-avatar');
        const ssoUsername = document.getElementById('sso-username');
        const ssoLogoutBtn = document.getElementById('sso-logout-btn');

        // 初始化/加载用户登录状态
        function initSSOState() {
          const token = localStorage.getItem('sso_access_token');
          const userStr = localStorage.getItem('sso_user');

          if (token && userStr) {
            const user = JSON.parse(userStr);
            if (ssoLoginBtn) ssoLoginBtn.style.display = 'none';
            if (ssoUserInfo) ssoUserInfo.style.display = 'flex';
            if (ssoUsername) ssoUsername.textContent = user.username;
            if (ssoAvatar) ssoAvatar.src = user.avatar || 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"%3E%3Ccircle cx="12" cy="8" r="4"/%3E%3Cpath d="M12 14c-4 0-6 2-6 4v2h12v-2c0-2-2-4-6-4z"/%3E%3C/svg%3E';
          } else {
            if (ssoLoginBtn) ssoLoginBtn.style.display = 'flex';
            if (ssoUserInfo) ssoUserInfo.style.display = 'none';
          }
        }

        // 处理 SSO 登录重定向流程
        if (ssoLoginBtn) {
          ssoLoginBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            try {
              // 从后端 API 动态拉取配置，避免前端硬编码 Client ID
              const res = await fetch(`${apiHost}/api/auth/config`);
              const config = await res.json();
              if (config && config.success) {
                const state = Math.random().toString(36).substring(2, 15);
                localStorage.setItem('sso_oauth_state', state);

                // 重定向到 SSO 授权页面，动态使用当前主页地址作为回调
                const currentRedirectUri = window.location.origin + window.location.pathname;
                const authUrl = `${config.authorize_url}?client_id=${config.client_id}&redirect_uri=${encodeURIComponent(currentRedirectUri)}&response_type=code&scope=openid profile email&state=${state}`;
                window.location.href = authUrl;
              } else {
                alert('无法获取 SSO 授权配置，请检查后端 API 服务！');
              }
            } catch (err) {
              console.error('获取 SSO 配置失败:', err);
              alert('连接 API 服务失败，请确保端口 3001 的 game-api 服务已启动！');
            }
          });
        }

        // 处理登出
        if (ssoLogoutBtn) {
          ssoLogoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('sso_access_token');
            localStorage.removeItem('sso_user');
            
            initSSOState();
            window.location.reload();
          });
        }

        // 处理 OAuth 回调逻辑（检查 URL 中是否存在 code 和 state）
        async function handleOAuthCallback() {
          const urlParams = new URLSearchParams(window.location.search);
          const code = urlParams.get('code');
          const state = urlParams.get('state');

          if (code) {
            const savedState = localStorage.getItem('sso_oauth_state');
            // 安全性校验 (防止 CSRF)
            if (state && savedState && state !== savedState) {
              console.warn('OAuth state mismatch!');
              return;
            }
            localStorage.removeItem('sso_oauth_state');

            // 显示加载状态
            if (ssoLoginBtn) ssoLoginBtn.innerHTML = '<span>⏳ 登录中...</span>';

            try {
              // 换取 Token 时的 redirect_uri 必须和第一阶段完全对齐一致
              const currentRedirectUri = window.location.origin + window.location.pathname;
              // 调用本地 API 后端换取 Token
              const res = await fetch(`${apiHost}/api/auth/callback`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                  code,
                  redirect_uri: currentRedirectUri
                })
              });

              const result = await res.json();
              if (result && result.success) {
                // 保存 Token 和用户信息到本地
                localStorage.setItem('sso_access_token', result.access_token);
                localStorage.setItem('sso_user', JSON.stringify(result.user));
                
                // 页面回弹清理 Query
                urlParams.delete('code');
                urlParams.delete('state');
                const cleanQuery = urlParams.toString();
                const cleanUrl = window.location.pathname + (cleanQuery ? '?' + cleanQuery : '') + window.location.hash;
                window.history.replaceState({}, document.title, cleanUrl);

                initSSOState();
                 const returnUrl = localStorage.getItem('sso_return_url');
                 if (returnUrl) {
                   localStorage.removeItem('sso_return_url');
                   try {
                     const urlObj = new URL(returnUrl, window.location.href);
                     const isCrossDomain = urlObj.host !== window.location.host;
                     if (isCrossDomain) {
                       const token = localStorage.getItem('sso_access_token');
                       const user = localStorage.getItem('sso_user');
                       if (token && user) {
                         urlObj.searchParams.set('sso_access_token', token);
                         urlObj.searchParams.set('sso_user', user);
                       }
                     }
                     window.location.href = urlObj.toString();
                   } catch (e) {
                     window.location.href = returnUrl;
                   }
                 } else {
                   window.location.reload();
                 }
              } else {
                alert('OAuth 登录失败: ' + (result.message || '未知错误'));
                initSSOState();
              }
            } catch (err) {
              console.error('SSO 换取 Token 失败:', err);
              alert('SSO 登录授权码交换失败，请确保 game-api 后端服务已启动！');
              initSSOState();
            }
          } else {
            initSSOState();
          }
        }

        // 启动执行
        handleOAuthCallback();
    </script>
</body>
</html>
