<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>21点游戏房间</title>
  <meta name="description" content="21点在线多人扑克游戏房间">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="puke_sprites.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 主体内容 */
    .game-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 128px;
      position: relative;
      z-index: 1;
    }

    .game-container {
      width: 100%;
      max-width: 760px;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 0.9375rem;
      color: var(--gold-light);
    }

    .header-logo svg {
      width: 20px;
      height: 20px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
      justify-content: flex-end;
      min-width: 0;
    }

    .room-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: rgba(212, 175, 55, 0.08);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .points-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: rgba(183, 121, 31, 0.08);
      border: 1px solid rgba(183, 121, 31, 0.18);
      border-radius: var(--radius-full);
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .points-badge span {
      color: var(--gold);
      font-weight: 800;
    }

    .account-score-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: var(--radius-full);
      background: rgba(183, 121, 31, 0.1);
      border: 1px solid rgba(183, 121, 31, 0.18);
      color: var(--gold);
      font-size: 0.75rem;
      font-weight: 700;
    }

    [data-theme="dark"] header,
    [data-theme="dark"] #game-actions {
      background: rgba(15, 25, 35, 0.9);
    }

    [data-theme="dark"] .player {
      background: rgba(22, 34, 48, 0.7);
    }

    [data-theme="dark"] .player-self,
    [data-theme="dark"] #player-self {
      background: rgba(20, 107, 58, 0.1);
    }

    [data-theme="dark"] #status,
    [data-theme="dark"] #chat-container {
      background: rgba(22, 34, 48, 0.72);
    }

    .room-badge span {
      color: var(--gold);
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.08em;
    }

    .copy-btn {
      width: 30px;
      height: 30px;
      padding: 0;
      font-size: 0.875rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }

    .copy-btn:hover {
      background: rgba(16, 185, 129, 0.15);
      border-color: rgba(16, 185, 129, 0.3);
      color: var(--success);
    }

    .exit-btn {
      width: 36px;
      height: 36px;
      padding: 0;
      font-size: 1rem;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.15);
      border-radius: 50%;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }

    .exit-btn:hover {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    /* Page Title */
    .page-title {
      text-align: center;
      padding: 20px 0 8px;
    }

    .page-title h1 {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text);
    }

    /* ===== 等待区 ===== */
    #waiting-area {
      padding: 36px 20px;
      text-align: center;
      animation: fadeSlideUp 0.5s ease;
    }

    .waiting-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--felt) 0%, var(--felt-dark) 100%);
      box-shadow: 0 4px 16px rgba(20, 107, 58, 0.25);
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }

    .waiting-icon svg {
      width: 26px;
      height: 26px;
      color: white;
    }

    #waiting-area h2 {
      color: var(--gold-light);
      font-size: 1.25rem;
      margin-bottom: 4px;
    }

    .waiting-subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 24px;
    }

    .player-counter {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: var(--radius-full);
      font-size: 0.9375rem;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .player-counter #player-count {
      color: var(--primary);
      font-weight: 700;
      font-size: 1.125rem;
    }

    /* 等待区玩家列表 */
    #player-list {
      margin: 0 auto;
      max-width: 380px;
      text-align: left;
    }

    #player-list h3 {
      color: var(--text-secondary);
      font-size: 0.8125rem;
      font-weight: 600;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .waiting-player-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      margin: 6px 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.9375rem;
      transition: all var(--transition);
      animation: fadeSlideUp 0.3s ease;
    }

    .waiting-player-item.is-self {
      background: rgba(59, 130, 246, 0.08);
      border-color: rgba(59, 130, 246, 0.2);
    }

    .waiting-player-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }

    .waiting-player-badges {
      display: flex;
      gap: 6px;
    }

    #start-game-button,
    #add-bot-button {
      margin-top: 24px;
      min-width: 200px;
    }

    /* 分享链接 */
    .share-link-box {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 12px auto 16px;
      padding: 8px 12px;
      width: 100%;
      max-width: 420px;
      box-sizing: border-box;
      background: rgba(59, 130, 246, 0.06);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
    }

    .share-link-icon {
      flex-shrink: 0;
    }

    .share-link-text {
      display: block;
      flex: 1;
      min-width: 0; /* Force flex item to shrink and allow ellipsis to work */
      width: 0;     /* Extra insurance for older browsers/engines to shrink flex items */
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-secondary);
      font-family: 'SF Mono', 'Fira Code', monospace;
      user-select: all;
    }

    .share-copy-btn {
      flex-shrink: 0;
      padding: 4px 12px;
      font-size: 0.6875rem;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 6px;
      color: var(--primary);
      cursor: pointer;
      transition: all var(--transition);
    }

    .share-copy-btn:hover {
      background: rgba(59, 130, 246, 0.25);
    }

    /* ===== 游戏区 ===== */
    #players {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 0.4s ease;
    }

    .player {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      width: 100%;
      text-align: left;
      transition: all var(--transition);
    }

    .player-self, #player-self {
      background: rgba(20, 107, 58, 0.08);
      border-color: rgba(16, 185, 129, 0.2);
    }

    .player-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .player-name-section {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .player-name-text {
      font-weight: 600;
      font-size: 0.9375rem;
    }

    .player-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-count {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .player .cards {
      min-height: 180px;
      gap: 0;
      justify-content: flex-start;
      margin-top: 8px;
    }

    /* ===== 操作按钮 ===== */
    /* ===== 操作按钮 (悬浮态) ===== */
    #game-actions {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 16px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      padding: 10px 20px;
      border-radius: 40px;
      border: 1px solid var(--border-gold);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.16), 0 0 0 1px rgba(255, 255, 255, 0.9);
      animation: fadeSlideUp 0.4s ease;
    }

    #game-actions button {
      min-width: 120px;
      padding: 12px 24px;
      font-size: 1rem;
      border-radius: 30px;
      font-weight: 600;
    }

    #hit-button {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
      min-width: 130px;
      padding: 14px 28px;
      font-size: 1rem;
      border-radius: var(--radius-md);
    }

    #hit-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.45);
    }

    #stand-button {
      background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%);
      color: #fff;
      box-shadow: 0 4px 14px var(--warning-glow);
      min-width: 130px;
      padding: 14px 28px;
      font-size: 1rem;
      border-radius: var(--radius-md);
    }

    #stand-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(245, 158, 11, 0.45);
    }

    /* ===== 状态栏 ===== */
    #status {
      text-align: center;
      padding: 12px 16px;
      margin-top: 16px;
      font-weight: 500;
      font-size: 0.875rem;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--border);
    }

    /* ===== 聊天区 ===== */
    #chat-container {
      margin-top: 20px;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.78);
    }

    .chat-header {
      padding: 10px 16px;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #chat-messages {
      height: 130px;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border: none;
      background: transparent;
      border-radius: 0;
    }

    #chat-input {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      margin: 0;
      height: auto;
    }

    #chat-input input {
      flex: 1;
      padding: 8px 12px;
      font-size: 0.8125rem;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    #chat-input button {
      padding: 8px 16px;
      font-size: 0.8125rem;
      margin: 0;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
      color: #fff;
      border-radius: 6px;
    }

    /* Responsive */
    @media (min-width: 900px) {
      .game-body {
        align-items: flex-start;
        padding: 24px 368px 140px 24px;
      }

      .game-container {
        margin: 0 auto;
      }

      #chat-container {
        position: fixed;
        top: 86px;
        right: 24px;
        bottom: 128px;
        width: 320px;
        display: flex;
        flex-direction: column;
        margin-top: 0;
        z-index: 90;
        box-shadow: var(--shadow-md);
      }

      #chat-messages {
        flex: 1;
        height: auto;
        min-height: 0;
      }
    }

    @media (max-width: 640px) {
      header {
        padding: 8px 12px;
      }

      .header-right {
        gap: 5px;
      }

      .points-badge,
      .room-badge {
        flex: 0 0 auto;
        gap: 4px;
        padding: 4px 7px;
        font-size: 0.75rem;
      }

      .header-label {
        display: none;
      }

      .room-badge span {
        letter-spacing: 0.02em;
      }

      .copy-btn,
      .theme-toggle,
      .exit-btn {
        width: 32px;
        height: 32px;
      }

      .game-body {
        padding: 12px 12px 112px;
      }

      #players {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .player-self, #player-self {
        grid-column: 1 / -1;
      }

      .player {
        padding: 10px 12px;
      }

      .player .cards {
        min-height: 120px;
        gap: 0;
      }

      /* 对手（非玩家自己）的移动端紧凑型排列，方便统观全局牌型 */
      .player:not(.player-self) {
        padding: 10px;
      }

      .player:not(.player-self) .player-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        margin-bottom: 6px;
      }

      .player:not(.player-self) .player-name-section {
        width: 100%;
        justify-content: space-between;
      }

      .player:not(.player-self) .player-meta {
        width: 100%;
        justify-content: space-between;
        gap: 6px;
        font-size: 0.75rem;
      }

      .player:not(.player-self) .player-meta .card-count {
        display: none; /* 既然有牌型直观可见，隐藏张数文字以节省空间 */
      }

      .player:not(.player-self) .cards {
        min-height: 85px;
        padding-left: 0;
        margin-top: 4px;
      }

      .player:not(.player-self) .card-wrapper {
        transform: scale(0.5) !important;
        transform-origin: top left;
        margin-right: -60px !important;
        margin-bottom: -85px !important;
      }

      .player:not(.player-self) .card-wrapper + .card-wrapper {
        margin-left: -35px !important;
      }

      #game-actions {
        bottom: 16px;
        padding: 8px 16px;
        gap: 10px;
      }

      #game-actions button {
        min-width: 100px;
        padding: 8px 16px;
        font-size: 0.875rem;
      }
    }

    @media (max-width: 380px) {
      .player .cards {
        min-height: 90px;
      }
    }
  </style>
</head>

<body>
  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="header-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"
          stroke-width="0.5">
          <path d="M12 18v4" />
          <path
            d="M2 14.499a5.5 5.5 0 0 0 9.591 3.675.6.6 0 0 1 .818.001A5.5 5.5 0 0 0 22 14.5c0-2.29-1.5-4-3-5.5l-5.492-5.312a2 2 0 0 0-3-.02L5 8.999c-1.5 1.5-3 3.2-3 5.5" />
        </svg>
        21点
      </div>
    </div>
    <div class="header-right">
      <div class="points-badge">
        <span aria-hidden="true">🏆</span><span class="header-label">账号积分</span><span id="account-score">0</span>
      </div>
      <div class="room-badge">
        <span aria-hidden="true">🏠</span><span class="header-label">房间</span><span id="room-id">加载中</span>
        <button class="copy-btn" onclick="copyRoomId()" aria-label="复制房间号" title="复制房间号">⧉</button>
      </div>
      <button class="theme-toggle" data-theme-toggle type="button">🌙</button>
      <button class="exit-btn" onclick="exitRoom()" aria-label="退出房间" title="退出房间">✕</button>
    </div>
  </header>

  <!-- 主体 -->
  <div class="game-body">
    <div class="game-container">

      <!-- 等待区域 -->
      <div id="waiting-area">
        <div class="waiting-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.128a4 4 0 0 1 0 7.744" />
          </svg>
        </div>
        <h2>等待玩家加入</h2>
        <p class="waiting-subtitle">分享链接给好友一起来玩吧！</p>
        <div class="share-link-box" id="share-link-box">
          <span class="share-link-icon">🔗</span>
          <span class="share-link-text" id="share-link-text"></span>
          <button class="share-copy-btn" onclick="copyShareLink()">复制链接</button>
        </div>
        <div class="player-counter">
          当前玩家 <span id="player-count">0</span> / 6
        </div>
        <div id="player-list"></div>
        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:24px">
          <button id="add-bot-button" class="btn-primary btn-lg" style="display:none">
            🤖 添加人机
          </button>
          <button id="start-game-button" class="btn-success btn-lg" style="display:none">
            🎮 开始游戏
          </button>
        </div>
      </div>

      <!-- 玩家区域 (游戏中) -->
      <div id="players" style="display: none;"></div>

      <!-- 操作按钮 -->
      <div id="game-actions" style="display: none;">
        <button id="hit-button">🃏 要牌</button>
        <button id="stand-button">✋ 停牌</button>
      </div>

      <!-- 状态栏 -->
      <div id="status">等待连接...</div>

      <!-- 聊天区域 -->
      <div id="chat-container">
        <div class="chat-header">💬 聊天</div>
        <div id="chat-messages"></div>
        <div id="chat-input">
          <input type="text" id="message" placeholder="输入消息..." autocomplete="off">
          <button id="send-button">发送</button>
        </div>
      </div>

    </div>
  </div>

  <script src="theme.js"></script>
  <script src="21game.js"></script>
  <script>
    initThemeToggle();

    // ===== 工具函数 =====
    function showToast(message) {
      document.querySelectorAll('.toast').forEach(t => t.remove());
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(-10px)';
        toast.style.transition = '0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    function copyToClipboard(text, successCallback) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(successCallback).catch(err => {
          fallbackCopyToClipboard(text, successCallback);
        });
      } else {
        fallbackCopyToClipboard(text, successCallback);
      }
    }

    function fallbackCopyToClipboard(text, successCallback) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.top = "0";
      textArea.style.left = "0";
      textArea.style.position = "fixed";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try {
        const successful = document.execCommand('copy');
        if (successful) {
          successCallback();
        } else {
          console.error('Fallback: Copying text command was unsuccessful');
        }
      } catch (err) {
        console.error('Fallback: Oops, unable to copy', err);
      }
      document.body.removeChild(textArea);
    }

    function copyRoomId() {
      const roomId = document.getElementById('room-id').textContent;
      copyToClipboard(roomId, () => {
        showToast('房间 ID 已复制到剪贴板');
      });
    }

    function exitRoom() {
      window.location.href = '21dian.html';
    }

    // 分享链接
    function initShareLink() {
      const urlParams = new URLSearchParams(window.location.search);
      const roomId = urlParams.get('roomId');
      if (roomId) {
        const shareUrl = `${window.location.origin}/21game.html?roomId=${roomId}`;
        document.getElementById('share-link-text').textContent = shareUrl;
      }
    }

    function copyShareLink() {
      const linkText = document.getElementById('share-link-text').textContent;
      copyToClipboard(linkText, () => {
        showToast('分享链接已复制到剪贴板');
        const btn = document.querySelector('.share-copy-btn');
        btn.textContent = '已复制 ✓';
        setTimeout(() => btn.textContent = '复制链接', 1500);
      });
    }

    // 初始化分享链接
    initShareLink();

    // 状态配置
    const statusConfig = {
      '等待中': { class: 'status-waiting', color: '#94a3b8' },
      '操作中': { class: 'status-acting', color: '#f59e0b' },
      '已停牌': { class: 'status-stood', color: '#10b981' },
      '已爆牌': { class: 'status-bust', color: '#ef4444' },
    };
  </script>
