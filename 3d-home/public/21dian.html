<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>21点 — 在线扑克对决</title>
  <meta name="description" content="经典21点在线多人扑克游戏，邀请好友一起来玩！">
  <link rel="stylesheet" href="common.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-direction: column;
    }

    /* 背景装饰牌 */
    .bg-cards {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-card-deco {
      position: absolute;
      width: 90px;
      height: 127px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(226, 232, 240, 0.65));
      border: 1px solid rgba(15, 23, 42, 0.08);
      opacity: 0.15;
    }

    .bg-card-deco:nth-child(1) {
      top: 8%;
      left: 5%;
      transform: rotate(-15deg);
      animation: float 6s ease-in-out infinite;
    }

    .bg-card-deco:nth-child(2) {
      top: 15%;
      right: 8%;
      transform: rotate(20deg);
      animation: float 7s ease-in-out infinite 1s;
    }

    .bg-card-deco:nth-child(3) {
      bottom: 12%;
      left: 10%;
      transform: rotate(10deg);
      animation: float 8s ease-in-out infinite 2s;
    }

    .bg-card-deco:nth-child(4) {
      bottom: 20%;
      right: 5%;
      transform: rotate(-25deg);
      animation: float 6.5s ease-in-out infinite 0.5s;
    }

    /* 主卡片 */
    .lobby-card {
      width: 100%;
      max-width: 400px;
      padding: 40px 32px;
      margin: 56px 20px 32px;
      text-align: center;
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.94);
      animation: fadeSlideUp 0.6s ease;
    }

    [data-theme="dark"] .lobby-card {
      background: rgba(22, 34, 48, 0.88);
    }

    /* Logo 区 */
    .logo-wrap {
      margin-bottom: 28px;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 68px;
      height: 68px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--felt) 0%, var(--felt-dark) 100%);
      box-shadow: 0 6px 20px rgba(20, 107, 58, 0.3);
      margin-bottom: 16px;
      animation: float 4s ease-in-out infinite;
    }

    .logo-icon svg {
      width: 34px;
      height: 34px;
    }

    .logo-title {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--text) 0%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 4px;
    }

    /* 表单 */
    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .account-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      margin: -4px 0 20px;
      background: rgba(183, 121, 31, 0.08);
      border: 1px solid rgba(183, 121, 31, 0.18);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 600;
    }

    .account-card strong {
      color: var(--gold);
      font-size: 1rem;
    }

    .leaderboard {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      text-align: left;
    }

    .leaderboard h3 {
      margin-bottom: 10px;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.04);
    }

    [data-theme="dark"] .bg-card-deco {
      background: linear-gradient(135deg, rgba(22, 34, 48, 0.6), rgba(30, 45, 65, 0.4));
      border-color: rgba(255, 255, 255, 0.04);
    }

    [data-theme="dark"] .leaderboard-item {
      background: rgba(255, 255, 255, 0.04);
    }

    .form-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .input-with-icon {
      position: relative;
    }

    .input-with-icon input {
      padding-left: 40px;
    }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
    }

    /* 按钮组 */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-group button {
      height: 48px;
      font-size: 0.9375rem;
    }

    /* 底部花色装饰 */
    .suits-deco {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 28px;
      color: var(--text-muted);
      font-size: 1.125rem;
      opacity: 0.4;
    }

    .suits-deco span {
      transition: all 0.3s;
    }

    .suits-deco span:hover {
      opacity: 1;
      transform: scale(1.3);
    }

    .suits-deco span:nth-child(1),
    .suits-deco span:nth-child(3) {
      color: var(--danger);
    }

    /* Modal 补充 */
    #join-modal .modal-content {
      text-align: left;
    }

    #join-modal .form-group {
      margin-top: 12px;
    }

    #login-modal .modal-content {
      text-align: left;
    }

    #login-modal .btn-block {
      margin-top: 16px;
    }
  </style>
</head>

<body>
  <div class="app-topbar">
    <div class="topbar-left">
      <div class="topbar-brand">♠ 21点</div>
      <div class="topbar-pill">积分 <strong id="account-score">0</strong></div>
    </div>
    <div class="topbar-right">
      <button class="account-avatar-btn" id="account-avatar-btn" onclick="showLoginModal()" aria-label="账号登录" title="账号登录">👤</button>
      <button class="theme-toggle" data-theme-toggle type="button">🌙</button>
    </div>
  </div>

  <!-- 背景装饰 -->
  <div class="bg-cards">
    <div class="bg-card-deco"></div>
    <div class="bg-card-deco"></div>
    <div class="bg-card-deco"></div>
    <div class="bg-card-deco"></div>
  </div>

  <!-- 主面板 -->
  <div class="lobby-card glass-panel-gold">
    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="0.5">
          <path d="M12 18v4" />
          <path
            d="M2 14.499a5.5 5.5 0 0 0 9.591 3.675.6.6 0 0 1 .818.001A5.5 5.5 0 0 0 22 14.5c0-2.29-1.5-4-3-5.5l-5.492-5.312a2 2 0 0 0-3-.02L5 8.999c-1.5 1.5-3 3.2-3 5.5" />
        </svg>
      </div>
      <h1 class="logo-title">21点在线游戏</h1>
      <p class="logo-subtitle">经典牌局对决 · 邀请好友开局</p>
    </div>

    <div class="leaderboard">
      <h3>排行榜</h3>
      <div class="leaderboard-list" id="leaderboard-list">暂无数据</div>
    </div>

    <!-- 按钮 -->
    <div class="btn-group">
      <button class="btn-success btn-block" id="create-room-btn" onclick="createRoom()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <path d="M5 12h14" />
          <path d="M12 5v14" />
        </svg>
        创建房间
      </button>
      <button class="btn-ghost btn-block" id="join-room-btn" onclick="showJoinModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.128a4 4 0 0 1 0 7.744" />
        </svg>
        加入房间
      </button>
    </div>

    <!-- 花色装饰 -->
    <div class="suits-deco">
      <span>♠</span>
      <span>♥</span>
      <span>♣</span>
      <span>♦</span>
    </div>
  </div>

  <!-- 加入房间弹窗 -->
  <div class="modal-overlay hidden" id="join-modal" onclick="closeJoinModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3>🚪 加入房间</h3>
      <div class="form-group">
        <label class="form-label" for="room-id-input">房间 ID</label>
        <input type="text" id="room-id-input" placeholder="输入5位数字房间ID..." maxlength="5" autocomplete="off"
          spellcheck="false" inputmode="numeric">
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" style="flex:1" onclick="hideJoinModal()">取消</button>
        <button class="btn-primary" style="flex:1" id="confirm-join-btn" onclick="joinRoom()">确认加入</button>
      </div>
    </div>
  </div>

  <!-- 登录弹窗 -->
  <div class="modal-overlay hidden" id="login-modal" onclick="closeLoginModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3>账号登录</h3>
      <div class="form-group">
        <label class="form-label" for="nickname-input">账号名称</label>
        <div class="input-with-icon">
          <span class="input-icon">👤</span>
          <input type="text" id="nickname-input" placeholder="输入账号名称..." maxlength="16"
            autocomplete="off" spellcheck="false">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password-input">密码</label>
        <div class="input-with-icon">
          <span class="input-icon">🔒</span>
          <input type="password" id="password-input" placeholder="输入密码..." maxlength="32"
            autocomplete="current-password">
        </div>
      </div>
      <button class="btn-primary btn-block" id="login-btn" onclick="loginAccount()">登录 / 注册</button>
    </div>
  </div>

  <script src="theme.js"></script>
  <script>
    // ========== 大厅逻辑 ==========

    const ACCOUNT_KEY = 'blackjack_account';
    const GUEST_KEY = 'blackjack_guest_name';
    let currentAccount = null;

    initThemeToggle();
    loadStoredAccount();
    loadLeaderboard();

    function loadStoredAccount() {
      try {
        currentAccount = JSON.parse(localStorage.getItem(ACCOUNT_KEY));
      } catch (e) {
        currentAccount = null;
      }
      if (currentAccount && currentAccount.username) {
        document.getElementById('nickname-input').value = currentAccount.username;
      } else {
        currentAccount = createGuestAccount();
      }
      updateAccountUI();
    }

    function createGuestAccount() {
      let guestName = sessionStorage.getItem(GUEST_KEY);
      if (!guestName) {
        guestName = '游客' + Math.floor(1000 + Math.random() * 9000);
        sessionStorage.setItem(GUEST_KEY, guestName);
      }
      return { username: guestName, score: 0, guest: true };
    }

    function updateAccountUI() {
      const isGuest = !currentAccount || currentAccount.guest;
      document.getElementById('account-score').textContent = currentAccount ? currentAccount.score : 0;
      const avatarBtn = document.getElementById('account-avatar-btn');
      avatarBtn.textContent = isGuest ? '👤' : currentAccount.username.slice(0, 1).toUpperCase();
      avatarBtn.setAttribute('aria-label', isGuest ? '账号登录' : `账号：${currentAccount.username}`);
      avatarBtn.title = isGuest ? '账号登录' : `账号：${currentAccount.username}`;
    }

    async function loginAccount() {
      const username = document.getElementById('nickname-input').value.trim();
      const password = document.getElementById('password-input').value;
      if (!username || !password) {
        showToast('请输入账号名称和密码');
        return null;
      }

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = '登录中...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.error) {
          showToast(data.error);
          return null;
        }
        currentAccount = { username: data.username, score: data.score };
        localStorage.setItem(ACCOUNT_KEY, JSON.stringify(currentAccount));
        updateAccountUI();
        loadLeaderboard();
        hideLoginModal();
        showToast(data.created ? '注册并登录成功' : '登录成功');
        return currentAccount;
      } catch (e) {
        showToast('网络错误，请检查服务器是否启动');
        console.error(e);
        return null;
      } finally {
        btn.disabled = false;
        btn.textContent = '登录 / 注册';
      }
    }

    async function ensureAccount() {
      return currentAccount || createGuestAccount();
    }

    function showLoginModal() {
      document.getElementById('login-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('nickname-input').focus(), 100);
    }

    function hideLoginModal() {
      document.getElementById('login-modal').classList.add('hidden');
    }

    function closeLoginModal(e) {
      if (e.target === e.currentTarget) hideLoginModal();
    }

    async function loadLeaderboard() {
      try {
        const res = await fetch('/api/leaderboard');
        const data = await res.json();
        const list = document.getElementById('leaderboard-list');
        const players = data.players || [];
        list.innerHTML = players.length ? players.map((player, index) => `
          <div class="leaderboard-item">
            <span>${index + 1}. ${player.username}</span>
            <strong>${player.score} 分</strong>
          </div>
        `).join('') : '暂无数据';
      } catch (e) {
        console.error(e);
      }
    }

    function getNickname() {
      return currentAccount ? currentAccount.username : document.getElementById('nickname-input').value.trim();
    }

    // 创建房间
    async function createRoom() {
      const account = await ensureAccount();
      if (!account) return;

      const btn = document.getElementById('create-room-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="pulse-dot"></span> 创建中...';

      try {
        const res = await fetch('/api/room/create', { method: 'POST' });
        const data = await res.json();
        if (data.roomId) {
          const nickname = encodeURIComponent(getNickname());
          const accountQuery = account.guest ? '' : `&account=${encodeURIComponent(account.username)}`;
          window.location.href = `21game.html?roomId=${data.roomId}&nickname=${nickname}${accountQuery}`;
        } else {
          showToast('创建失败，请重试');
        }
      } catch (e) {
        showToast('网络错误，请检查服务器是否启动');
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg> 创建房间`;
      }
    }

    // 弹窗控制
    function showJoinModal() {
      document.getElementById('join-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('room-id-input').focus(), 100);
    }
    function hideJoinModal() {
      document.getElementById('join-modal').classList.add('hidden');
    }
    function closeJoinModal(e) {
      if (e.target === e.currentTarget) hideJoinModal();
    }

    // 加入房间
    async function joinRoom() {
      const account = await ensureAccount();
      if (!account) return;

      const roomId = document.getElementById('room-id-input').value.trim();
      if (!roomId) {
        showToast('请输入房间 ID');
        return;
      }

      const btn = document.getElementById('confirm-join-btn');
      btn.disabled = true;
      btn.textContent = '加入中...';

      try {
        // 先检查房间是否存在
        const res = await fetch(`/api/room/${roomId}`);
        const data = await res.json();

        if (data.error) {
          showToast(data.error);
          return;
        }

        if (data.status === 1) {
          showToast('游戏已开始，无法加入');
          return;
        }

        const nickname = encodeURIComponent(getNickname());
        const accountQuery = account.guest ? '' : `&account=${encodeURIComponent(account.username)}`;
        window.location.href = `21game.html?roomId=${roomId}&nickname=${nickname}${accountQuery}`;
      } catch (e) {
        showToast('网络错误，请检查服务器是否启动');
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.textContent = '确认加入';
      }
    }

    // Toast 提示
    function showToast(message) {
      // 移除已有的toast
      document.querySelectorAll('.toast').forEach(t => t.remove());

      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(-10px)';
        toast.style.transition = '0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    // 回车确认加入
    document.getElementById('room-id-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') joinRoom();
    });

    // 回车创建房间
    document.getElementById('nickname-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginAccount();
    });

    document.getElementById('password-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginAccount();
    });
  </script>
</body>

</html>
