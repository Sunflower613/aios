<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>艺术画室 · 3D 调色盘写生</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff8c69;
            --primary-glow: rgba(255, 140, 105, 0.2);
            --secondary: #64b5f6;
            --success: #4caf50;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --bg-page: #ffffff;
            --bg-card: #f8fafc;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.08);
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: 'Outfit', 'Noto Sans SC', system-ui, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        .paint-layout {
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            gap: 24px;
            width: 100%;
            height: 100%;
            max-width: 1200px;
            max-height: 700px;
            padding: 24px;
            box-sizing: border-box;
            align-items: stretch;
        }

        .column-left, .column-right {
            display: flex;
            flex-direction: column;
            gap: 16px;
            justify-content: space-between;
        }

        .column-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card panels */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        /* Target Matching Color */
        .target-card {
            align-items: center;
            text-align: center;
        }

        .target-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .target-color-display {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 3px solid #ffffff;
            box-shadow: var(--shadow-md), 0 0 0 1px var(--border-color);
            margin: 4px 0;
            transition: background-color 0.3s;
        }

        .target-hex {
            font-size: 0.9rem;
            font-weight: 600;
            font-family: monospace;
            color: var(--text-main);
        }

        /* Button Styling */
        .btn {
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid var(--border-color);
            background: #ffffff;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:hover {
            border-color: #94a3b8;
            background: #f1f5f9;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            width: 100%;
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Color Palette Pots */
        .palette-card {
            flex-grow: 1;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .color-pot {
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: var(--shadow-sm), 0 0 0 1px var(--border-color);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.6);
        }

        .color-pot:hover {
            transform: scale(1.15);
            box-shadow: var(--shadow-md), 0 0 0 1.5px #64748b;
        }

        .color-pot.active {
            transform: scale(1.2);
            border-color: #ffffff;
            box-shadow: 0 0 0 2.5px var(--text-main), var(--shadow-md);
        }

        .blend-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: auto;
        }

        .btn-blend {
            border-radius: 8px;
            padding: 8px 0;
            font-size: 0.8rem;
        }

        /* Canvas Wrap (1:1 Ratio) */
        .canvas-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 460px;
            max-height: 460px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            cursor: crosshair;
            touch-action: none;
            display: block;
            background-color: #ffffff;
        }

        /* Tools Selection */
        .tool-toggle-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-tool {
            border-radius: 8px;
            padding: 8px 0;
            flex-direction: column;
            gap: 4px;
            font-size: 0.8rem;
        }

        .btn-tool.active {
            background: var(--text-main);
            color: #ffffff;
            border-color: var(--text-main);
        }

        .btn-tool .tool-icon {
            font-size: 1.15rem;
        }

        /* Sizes Control */
        .size-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .btn-size {
            border-radius: 6px;
            padding: 6px 0;
            font-size: 0.8rem;
        }

        .btn-size.active {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 8px var(--primary-glow);
        }

        /* Current Color Preview */
        .preview-card {
            align-items: center;
            justify-content: center;
        }

        .preview-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .color-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: var(--shadow-md), 0 0 0 1px var(--border-color);
            transition: background-color 0.2s;
        }

        /* Submission & Undo Actions */
        .actions-card {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
            gap: 12px;
        }

        .actions-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-action {
            border-radius: 8px;
            padding: 8px 0;
            font-size: 0.8rem;
        }

        .btn-undo {
            border-color: var(--border-color);
        }

        .btn-clear {
            background: #fff5f5;
            border-color: #fee2e2;
            color: #ef4444;
        }

        .btn-clear:hover {
            background: #fecaca;
            border-color: #fca5a5;
        }

        .btn-submit {
            width: 100%;
            background: var(--success);
            border-color: var(--success);
            color: #ffffff;
            padding: 12px 0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .btn-submit:hover {
            background: #2e7d32;
            border-color: #2e7d32;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        /* Alert Dialogue */
        .alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .alert-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px 30px;
            text-align: center;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.27);
        }

        .alert-card.show {
            transform: scale(1);
        }

        .alert-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .alert-similarity {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .alert-message {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .mobile-close-btn {
            display: none !important;
        }

        @media (max-width: 768px), (pointer: coarse), (max-height: 520px) {
            .mobile-close-btn {
                display: flex !important;
                width: 36px !important;
                height: 36px !important;
                border-radius: 50% !important;
                background: #ffffff !important;
                color: var(--text-main) !important;
                border: 1px solid var(--border-color) !important;
                align-items: center;
                justify-content: center;
                box-shadow: var(--shadow-sm);
                cursor: pointer;
                transition: all 0.2s;
                padding: 0 !important;
                margin: 0 auto 4px auto !important;
                z-index: 100;
            }
            .mobile-close-btn:hover {
                background: #f1f5f9 !important;
                border-color: #94a3b8 !important;
                transform: scale(1.05);
            }
            .mobile-close-btn:active {
                transform: scale(0.95);
            }
            .mobile-close-btn svg {
                width: 20px;
                height: 20px;
                display: block;
            }
            .column-left {
                position: relative;
            }
        }

        /* Responsive Mobile Layout for Small Viewports (Landscape) */
        @media (max-height: 520px) {
            .paint-layout {
                grid-template-columns: 140px 1fr 140px;
                gap: 8px;
                padding: 0 8px !important;
                height: 100vh !important;
                max-height: 100vh !important;
                align-items: stretch !important;
            }

            .card {
                padding: 6px !important;
                gap: 6px !important;
            }

            .card-title {
                display: none !important; /* Hide card titles to save massive vertical space */
            }

            .column-left, .column-right {
                padding: 8px 0 !important;
                gap: 6px !important;
            }

            .column-center {
                padding: 0 !important;
                margin: 0 !important;
                height: 100vh !important;
            }

            .canvas-container {
                width: 100% !important;
                height: auto !important;
                max-width: 100vh !important;
                max-height: 100vh !important;
                aspect-ratio: 1 / 1 !important;
                border-radius: 0 !important;
                border-top: none !important;
                border-bottom: none !important;
                box-shadow: none !important;
            }

            .target-color-display {
                width: 36px;
                height: 36px;
            }

            .target-title {
                font-size: 0.75rem !important;
                margin-bottom: 2px !important;
            }

            .target-hex {
                font-size: 0.75rem !important;
            }

            .palette-grid {
                gap: 4px;
            }

            .color-pot {
                border-width: 1.5px;
                font-size: 0.7rem !important;
                height: 20px !important;
                line-height: 20px !important;
            }

            .blend-actions {
                gap: 4px !important;
            }

            .btn {
                padding: 6px 10px !important;
                font-size: 0.75rem !important;
            }

            .btn-tool {
                padding: 4px 0 !important;
                font-size: 0.75rem !important;
            }

            .btn-tool .tool-icon {
                font-size: 0.85rem !important;
            }

            .color-circle {
                width: 20px;
                height: 20px;
            }

            .btn-submit {
                padding: 6px 0 !important;
                font-size: 0.75rem !important;
            }
        }
    </style>
</head>
<body>

    <div class="paint-layout">
        <!-- Left Column: Colors & Target -->
        <div class="column-left">
            <button class="btn mobile-close-btn" onclick="exitPaint()" aria-label="返回 3D 房间">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <!-- Target Color Card -->
            <div class="card target-card">
                <div class="target-title">写生目标色</div>
                <div class="target-color-display" id="target-color"></div>
                <div class="target-hex" id="target-hex">#ffffff</div>
                <button class="btn btn-secondary" onclick="generateNewTarget()">换目标色</button>
            </div>
            <!-- Color Palette -->
            <div class="card palette-card">
                <div class="card-title">调色盘</div>
                <div class="palette-grid">
                    <div class="color-pot active" onclick="chooseColor('rgb(255, 64, 129)')" style="background-color: rgb(255, 64, 129);">红</div>
                    <div class="color-pot" onclick="chooseColor('rgb(255, 235, 59)')" style="background-color: rgb(255, 235, 59); color:#000; text-shadow:none;">黄</div>
                    <div class="color-pot" onclick="chooseColor('rgb(33, 150, 243)')" style="background-color: rgb(33, 150, 243);">蓝</div>
                    <div class="color-pot" onclick="chooseColor('rgb(76, 175, 80)')" style="background-color: rgb(76, 175, 80);">绿</div>
                    <div class="color-pot" onclick="chooseColor('rgb(255, 255, 255)')" style="background-color: rgb(255, 255, 255); color:#000; text-shadow:none;">白</div>
                    <div class="color-pot" onclick="chooseColor('rgb(17, 17, 17)')" style="background-color: rgb(17, 17, 17);">黑</div>
                    <div class="color-pot" onclick="chooseColor('rgb(156, 39, 176)')" style="background-color: rgb(156, 39, 176);">紫</div>
                    <div class="color-pot" onclick="chooseColor('rgb(255, 152, 0)')" style="background-color: rgb(255, 152, 0);">橙</div>
                    <div class="color-pot" onclick="chooseColor('rgb(0, 188, 212)')" style="background-color: rgb(0, 188, 212);">青</div>
                    <div class="color-pot" onclick="chooseColor('rgb(121, 85, 72)')" style="background-color: rgb(121, 85, 72);">褐</div>
                </div>
                <div class="blend-actions">
                    <button class="btn btn-blend" onclick="waterBlend()" style="background-color: rgb(224, 247, 250); color:#0097a7;">水</button>
                    <button class="btn btn-blend" id="btn-mix" onclick="mixColors()" style="background: linear-gradient(135deg, #ff4081, #9c27b0); color:#fff;">融合</button>
                </div>
            </div>
        </div>
        
        <!-- Center Column: Square Canvas -->
        <div class="column-center">
            <div class="canvas-container">
                <canvas id="canvas" width="400" height="400"></canvas>
            </div>
        </div>
        
        <!-- Right Column: Tools & Actions -->
        <div class="column-right">
            <!-- Tool Selection -->
            <div class="card tools-card">
                <div class="card-title">绘画工具</div>
                <div class="tool-toggle-group">
                    <button class="btn btn-tool active" id="tool-brush" onclick="selectTool('brush')">
                        <span class="tool-icon">🖌️</span>画笔
                    </button>
                    <button class="btn btn-tool" id="tool-eraser" onclick="selectTool('eraser')">
                        <span class="tool-icon">🧼</span>橡皮
                    </button>
                </div>
            </div>
            
            <!-- Brush Sizes -->
            <div class="card size-card">
                <div class="card-title">尺寸</div>
                <div class="size-group">
                    <button class="btn btn-size" id="size-small" onclick="setBrushSize(8, 'small')">小</button>
                    <button class="btn btn-size active" id="size-medium" onclick="setBrushSize(18, 'medium')">中</button>
                    <button class="btn btn-size" id="size-large" onclick="setBrushSize(28, 'large')">大</button>
                </div>
            </div>

            <!-- Color Preview -->
            <div class="card preview-card">
                <div class="card-title">当前色</div>
                <div class="preview-container">
                    <div class="color-circle" id="now-color-circle" style="background-color: rgb(255, 64, 129);"></div>
                </div>
            </div>
            
            <!-- Actions & Submission -->
            <div class="card actions-card">
                <div class="actions-group">
                    <button class="btn btn-action btn-undo" onclick="undo()">撤销</button>
                    <button class="btn btn-action btn-clear" onclick="clearCanvas()">清空</button>
                </div>
                <button class="btn btn-submit" onclick="submitPaint()">完成比对</button>
            </div>
        </div>
    </div>

    <!-- Alert Overlay Dialog -->
    <div class="alert-overlay" id="alert-overlay">
        <div class="alert-card" id="alert-card">
            <div class="alert-title">写生色彩比对</div>
            <div class="alert-similarity" id="alert-similarity">0%</div>
            <div class="alert-message" id="alert-message">你调制的色彩与目标色彩很接近！</div>
            <button class="btn btn-action" onclick="closeAlert()" style="background:var(--secondary); border-color:var(--secondary); width:100%; color:#fff;">继续写生</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let currentColor = 'rgb(255, 64, 129)';
        let previousColor = 'rgb(255, 255, 255)';
        let targetColor = 'rgb(255, 255, 255)';
        let isDrawing = false;
        let brushRadius = 18;
        let currentTool = 'brush'; // 'brush' or 'eraser'

        // Undo History Stack
        const historyStack = [];
        const maxHistory = 15;

        // Set up canvas default (fill with white)
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Generate initial target color
        generateNewTarget();
        updateColorsHud();

        // Canvas event listeners
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            saveHistory();
            paintAt(e.clientX, e.clientY);
        });

        window.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                paintAt(e.clientX, e.clientY);
            }
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            saveHistory();
            const touch = e.touches[0];
            paintAt(touch.clientX, touch.clientY);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDrawing) {
                const touch = e.touches[0];
                paintAt(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isDrawing = false;
        });

        function paintAt(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round(((clientX - rect.left) / rect.width) * canvas.width);
            const y = Math.round(((clientY - rect.top) / rect.height) * canvas.height);

            if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                if (currentTool === 'eraser') {
                    // Eraser draws solid white directly, no blending!
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(x, y, brushRadius, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Brush blends color with wet paint look
                    const imgData = ctx.getImageData(x, y, 1, 1);
                    const r = imgData.data[0];
                    const g = imgData.data[1];
                    const b = imgData.data[2];
                    const a = imgData.data[3];
                    
                    const existingColor = a === 0 ? 'rgb(255, 255, 255)' : `rgb(${r}, ${g}, ${b})`;
                    const mixed = mix(currentColor, existingColor);

                    ctx.fillStyle = mixed;
                    ctx.beginPath();
                    ctx.arc(x, y, brushRadius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function chooseColor(color) {
            previousColor = currentColor;
            currentColor = color;
            selectTool('brush'); // Auto switch back to brush when choosing a pigment
            updateColorsHud();

            // Set active class on color pots
            document.querySelectorAll('.color-pot').forEach(pot => {
                const potColor = pot.style.backgroundColor;
                if (potColor === color || potColor.replace(/\s+/g, '') === color.replace(/\s+/g, '')) {
                    pot.classList.add('active');
                } else {
                    pot.classList.remove('active');
                }
            });
        }

        function selectTool(tool) {
            currentTool = tool;
            
            // Update UI buttons active state
            document.getElementById('tool-brush').classList.toggle('active', tool === 'brush');
            document.getElementById('tool-eraser').classList.toggle('active', tool === 'eraser');
            
            if (tool === 'eraser') {
                document.querySelectorAll('.color-pot').forEach(pot => pot.classList.remove('active'));
            }
        }

        function updateColorsHud() {
            document.getElementById('now-color-circle').style.backgroundColor = currentColor;
        }

        // Wet blend: 75% brush color, 25% canvas color
        function mix(color1, color2) {
            const rgb1 = parseRgb(color1);
            const rgb2 = parseRgb(color2);

            const r = Math.round(rgb1.r * 0.75 + rgb2.r * 0.25);
            const g = Math.round(rgb1.g * 0.75 + rgb2.g * 0.25);
            const b = Math.round(rgb1.b * 0.75 + rgb2.b * 0.25);

            return `rgb(${r}, ${g}, ${b})`;
        }

        // Palette blend: 50% / 50% mix of current and previous colors
        function mixColors() {
            if (currentTool === 'eraser') return; // Cannot mix in eraser mode
            
            const rgb1 = parseRgb(currentColor);
            const rgb2 = parseRgb(previousColor);

            const r = Math.round((rgb1.r + rgb2.r) / 2);
            const g = Math.round((rgb1.g + rgb2.g) / 2);
            const b = Math.round((rgb1.b + rgb2.b) / 2);

            saveHistory();
            currentColor = `rgb(${r}, ${g}, ${b})`;
            updateColorsHud();

            // Flash active mix button feedback
            const btn = document.getElementById('btn-mix');
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => btn.style.transform = 'scale(1)', 150);
        }

        // Clear water dilutes the brush: blend currentColor with white (50% water dilution)
        function waterBlend() {
            if (currentTool === 'eraser') return; // Cannot blend water in eraser mode
            chooseColor(mix(currentColor, 'rgb(255, 255, 255)'));
        }

        function parseRgb(colorStr) {
            const matches = colorStr.match(/\d+/g);
            if (!matches) return { r: 255, g: 255, b: 255 };
            return {
                r: parseInt(matches[0]),
                g: parseInt(matches[1]),
                b: parseInt(matches[2])
            };
        }

        function generateNewTarget() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            targetColor = `rgb(${r}, ${g}, ${b})`;
            
            document.getElementById('target-color').style.backgroundColor = targetColor;
            
            const hex = '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
            document.getElementById('target-hex').textContent = hex;
        }

        function saveHistory() {
            if (historyStack.length >= maxHistory) {
                historyStack.shift();
            }
            historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        }

        function undo() {
            if (historyStack.length > 0) {
                const imgData = historyStack.pop();
                ctx.putImageData(imgData, 0, 0);
            }
        }

        function clearCanvas() {
            saveHistory();
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function setBrushSize(radius, sizeName) {
            brushRadius = radius;
            document.querySelectorAll('.btn-size').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`size-${sizeName}`).classList.add('active');
        }

        // Color similarity comparison
        function submitPaint() {
            const userImg = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const targetRGB = parseRgb(targetColor);

            let totalDelta = 0;
            const stepVal = 4; // Sample every 4th pixel to save CPU
            let count = 0;

            for (let i = 0; i < userImg.data.length; i += 4 * stepVal) {
                const ur = userImg.data[i];
                const ug = userImg.data[i+1];
                const ub = userImg.data[i+2];

                const dr = ur - targetRGB.r;
                const dg = ug - targetRGB.g;
                const db = ub - targetRGB.b;
                const dist = Math.sqrt(dr*dr + dg*dg + db*db);

                totalDelta += dist;
                count++;
            }

            const avgDelta = totalDelta / count;
            const maxDist = Math.sqrt(255*255 + 255*255 + 255*255);
            const similarity = Math.max(0, Math.round((1 - (avgDelta / maxDist)) * 100));

            const simEl = document.getElementById('alert-similarity');
            const msgEl = document.getElementById('alert-message');
            
            simEl.textContent = `${similarity}%`;
            
            if (similarity >= 92) {
                msgEl.textContent = '神乎其技！色彩还原度极高，你简直是莫奈在世！';
            } else if (similarity >= 82) {
                msgEl.textContent = '绝妙的色彩调和！这幅写生非常接近目标色。';
            } else if (similarity >= 70) {
                msgEl.textContent = '调色感觉很好，细节再精进一点会更棒哦！';
            } else {
                msgEl.textContent = '色彩似乎有点偏离，再试一试，享受混色的乐趣！';
            }

            const overlay = document.getElementById('alert-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                document.getElementById('alert-card').classList.add('show');
            }, 10);
        }

        function closeAlert() {
            const card = document.getElementById('alert-card');
            card.classList.remove('show');
            setTimeout(() => {
                document.getElementById('alert-overlay').style.display = 'none';
            }, 300);
        }

        function exitPaint() {
            window.parent.document.querySelector('.modal-close[data-close="modal-easel"]').click();
        }
    </script>
</body>
</html>
