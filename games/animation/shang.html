<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #000;
        }

.huang {
    margin: 0 auto;
    width: 500px;
    height: 300px;
    background-image: url("huang.jpg");
    background-size: cover;
}
.box1 {
    width: 100px;
    height: 100px;
    position: relative;
    top:45%;
    left: 54%;
    background-image: url("100yuan.png");
    background-size: cover;
}
.box1:hover {
    transform: translate(60px, 80px) rotate(-45deg) scale(5, 4) skew(30deg, -30deg);
    transition: transform 1s ease;
}
    </style>
</head>
<body>
    <div class="huang"><div class="box1"></div></div>
</body>
</html>
