<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firework Effect</title>
  <style>
    html {
      overflow: hidden;
    }

    body {
      overflow: hidden;
      margin: 0;
      background-color: rgb(0, 0, 0);
      user-select: none;
    }

    canvas {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    #FSbutton {
      bottom: 10px;
      right: 10px;
    }

    #AFbutton {
      top: 10px;
      right: 10px;
    }

    button {
      position: fixed;
      z-index: 1000;
      background-color: transparent;
      color: white;
      text-align: center;
      text-decoration: none;
      border: none;
      opacity: 0.5;
      font-size: 1em;
      margin: 4px 2px;
      cursor: pointer;
      border-radius: 50%;
      width: 50px;
      height: 50px;
    }
    button :hover {
      opacity: 1;
    }
  </style>
  <script>

    function launchFullscreen(element) {
      console.log("launchFullscreen");
      const button = document.getElementById('FSbutton');
      const button2 = document.getElementById('AFbutton');
      button.style.opacity = 1;

      if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
        if (element.requestFullscreen) {
          element.requestFullscreen();
        } else if (element.mozRequestFullScreen) {
          element.mozRequestFullScreen();
        } else if (element.webkitRequestFullscreen) {
          element.webkitRequestFullscreen();
        } else if (element.msRequestFullscreen) {
          element.msRequestFullscreen();
        }
        button.querySelector("img").src = "full-e.png";
        button2.style.opacity = 0;
        if (window.orientation !== undefined || screen.orientation !== undefined) {
          // This is a mobile device, lock the screen orientation
          screen.orientation.lock('portrait');
        }
      }
      else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
        button.querySelector("img").src = "full.png";
        button2.style.opacity = 0.5;
        if (window.orientation !== undefined || screen.orientation !== undefined) {
          // This is a mobile device, unlock the screen orientation
          screen.orientation.unlock();
        }
      }
      sleep(3000).then(() => {
        button.style.opacity = 0.5;
      });


    }
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
    var audio_boom = new Audio('firework_boom.mp3');
    var audio_fire = new Audio('firework_fire.mp3');
    function audioPause() {
      const button2 = document.getElementById('AFbutton');
      button2.style.opacity = 1;
      if (audio_boom.volume != 0) {
        audio_boom.volume = 0;
        audio_fire.volume = 0;
        button2.querySelector("img").src = "horn-l.png";
      }
      else {
        audio_boom.volume = 1;
        audio_fire.volume = 1;
        button2.querySelector("img").src = "horn.png";
      }
      sleep(3000).then(() => {
        button2.style.opacity = 0.5;
      });

    }
  </script>
</head>

<body>
  <button id="FSbutton" onclick="launchFullscreen(document.documentElement)" ontouchstart="launchFullscreen(document.documentElement)"><img src="full.png" alt=""
      width="100%"></button>
  <button id="AFbutton" onclick="audioPause()" ontouchstart="audioPause()"><img src="horn.png" alt="" width="100%"></button>
  <canvas id="canvas"></canvas>
  <script>
    function clickEffect() {
      let fireworks = [];
      let width, height;
      let ctx;
      const colours = [
        ["#ff0000", "#ff394d", "#ff6e68"], // 红
        ["#ffee00", "#ee9912", "#ce8e08"], // 橙
        ["#f7ff34", "#ffff00", "#ffffff"], // 黄
        ["#ccff4d", "#99ff99", "#00cc00"], // 绿
        ["#00ccff", "#99ffff", "#00ffff"], // 青
        ["#00bdff", "#4d39ce", "#088eff"], // 蓝
        ["#cc33cc", "#9933cc", "#6600cc"], // 紫
        ["#ff66ff", "#ff33cc", "#ff66cc"], // 粉
      ];


      const canvas = document.getElementById("canvas");
      var index = 0;


      if (canvas.getContext && window.addEventListener) {
        ctx = canvas.getContext("2d");
        updateSize();
        window.addEventListener('resize', updateSize, false);
        loop();
        window.addEventListener("mousemove", function (e) {
          pushFireworks(5, randBetween(1, 5), e.clientX, e.clientY);
          audio_fire.play();
        }, false);
        window.addEventListener("mouseup", function (e) {
          pushFireworks(15, randBetween(70, 80), e.clientX, e.clientY);
          audio_fire.pause();
          audio_boom.play();
          index++;
        }, false);
        window.addEventListener("touchmove", function (e) {
          e.preventDefault();
          let touch = e.touches[0];
          pushFireworks(5, randBetween(1, 5), touch.clientX, touch.clientY);
          audio_fire.play();
        }, { passive: false });
        window.addEventListener("touchend", function (e) {
          e.preventDefault();
          let touch = e.changedTouches[0];
          pushFireworks(15, randBetween(70, 80), touch.clientX, touch.clientY);
          audio_fire.pause();
          audio_boom.play();
          index++;
        }, { passive: false });

      } else {
        console.log("canvas or addEventListener is unsupported!");
      }

      function updateSize() {
        canvas.width = window.innerWidth * 2;
        canvas.height = window.innerHeight * 2;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.scale(2, 2);
        width = (canvas.width = window.innerWidth);
        height = (canvas.height = window.innerHeight);
      }

      class Firework {
        constructor(size, x, y) {
          this.x = x; // 烟花的 x 坐标
          this.y = y; // 烟花的 y 坐标
          // 生成随机角度（0 到 2π）
          const angle = Math.random() * Math.PI * 2;
          // 生成随机速度（半径为 5）
          const speed = Math.random() * size + 1;
          // 将极坐标转换成水平和垂直速度
          this.vx = Math.cos(angle) * speed; // 水平速度
          this.vy = Math.sin(angle) * speed; // 垂直速度
          this.radius = 2; // 烟花半径
          this.colorIndex = index % colours.length;
          this.color = colours[this.colorIndex][Math.floor(Math.random() * 3)]; // 随机颜色
          this.opacity = 1; // 透明度
          this.opacitySpeed = 1 / size; // 透明度减小速度
          this.gravity = 0; // 重力
          this.life = 100; // 生命周期
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.vy += this.gravity;
          this.opacity -= this.opacitySpeed;
          this.life--;
        }

        draw(ctx) {
          ctx.save();
          ctx.globalAlpha = this.opacity;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
          ctx.closePath();
          ctx.restore();
        }

        isAlive() {
          return this.life > 0 && this.opacity > 0;
        }
      }

      function pushFireworks(size, count = 1, x, y) {
        for (let i = 0; i < count; i++) {
          fireworks.push(new Firework(size, x, y));
        }
      }

      function randBetween(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function loop() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
        ctx.fillRect(0, 0, width, height);

        fireworks.forEach((firework, index) => {
          firework.update();
          firework.draw(ctx);
          if (!firework.isAlive()) {
            fireworks.splice(index, 1);
          }
        });

        requestAnimationFrame(loop);
      }
    }
    clickEffect();//调用特效函数
  </script>
</body>

</html>
