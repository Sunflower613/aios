<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>随心粒子</title>
    <script src="http://cdn.sucai8.cn/cdn/jquery/jquery-1.10.2.js"></script>
    <style>
      html{
        overflow: hidden;
      }
      body {
        overflow: hidden;
        margin: 0;
        background-color: black;
        user-select: none;
      }
 
      .twitter:hover a {
        transform: rotate(-45deg) scale(1.05);
      }
      .twitter:hover i {
        color: #21c2ff;
      }
      .twitter a {
        bottom: -40px;
        right: -75px;
        transform: rotate(-45deg);
      }
      .twitter i {
        bottom: 7px;
        right: 7px;
        color: #00aced;
      }
 
      .social-icon a {
        position: absolute;
        background: black;
        color: black;
        box-shadow: -1px -1px 20px 0px rgba(0, 0, 0, 0.3);
        display: inline-block;
        width: 150px;
        height: 80px;
        transform-origin: 50% 50%;
        transition: 0.15s ease-out;
      }
      .social-icon i {
        position: absolute;
        pointer-events: none;
        z-index: 1000;
        transition: 0.15s ease-out;
      }
 
      .youtube:hover a {
        transform: rotate(45deg) scale(1.05);
      }
      .youtube:hover i {
        color: #ec4c44;
      }
      .youtube a {
        bottom: -40px;
        left: -75px;
        transform: rotate(45deg);
      }
      .youtube i {
        bottom: 7px;
        left: 7px;
        color: #e62117;
      }
      #FSbutton {
        position: fixed;
        bottom: 10px;
        right: 10px;
        z-index: 1000;
        background-color: transparent;
        border: none;
        color: white;
        text-align: center;
        text-decoration: none;
  
        font-size: 1em;
        margin: 4px 2px;
        cursor: pointer;
        border-radius: 50%;
        width: 50px;
        height: 50px;
      }
    
    </style>
    <script>
      function launchFullscreen(element) {
        const button=document.getElementById('FSbutton');
        button.style.opacity=1;
        if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement ) {
          if(element.requestFullscreen) {
              element.requestFullscreen();
          } else if(element.mozRequestFullScreen) {
              element.mozRequestFullScreen();
          } else if(element.webkitRequestFullscreen) {
              element.webkitRequestFullscreen();
          } else if(element.msRequestFullscreen) {
              element.msRequestFullscreen();
          }
	button.querySelector("img").src = "full-e.png";
          if (window.orientation !== undefined || screen.orientation !== undefined) {
            // This is a mobile device, lock the screen orientation
            screen.orientation.lock('portrait');
        }
      } 
      else {
          if(document.exitFullscreen) {
              document.exitFullscreen();
          } else if(document.mozCancelFullScreen) {
              document.mozCancelFullScreen();
          } else if(document.webkitExitFullscreen) {
              document.webkitExitFullscreen();
          } else if(document.msExitFullscreen) {
              document.msExitFullscreen();
          }
	button.querySelector("img").src = "full.png";
          if (window.orientation !== undefined || screen.orientation !== undefined) {
            // This is a mobile device, unlock the screen orientation
            screen.orientation.unlock();
        }
      }
      sleep(3000).then(() => {
        button.style.opacity=0.5;
      });
      sleep(5000).then(() => {
        button.style.opacity=0.2;
      });
     
    }
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
  }
  
  launchFullscreen(document.documentElement);
    </script>
  </head>
  <body>
    <button id="FSbutton" onclick="launchFullscreen(document.documentElement)"><img src="full.png" alt="" width="100%"></button>

    <canvas></canvas>
 
    <script>
      "use strict";
 
      // Initial Setup
      var canvas = document.querySelector("canvas");
      var c = canvas.getContext("2d");
 
      canvas.width = innerWidth;
      canvas.height = innerHeight;
 
      // Variables
      var mouse = {
        x: innerWidth / 2,
        y: innerHeight / 2 - 80,
      };
 
      var colors = ["#00bdff", "#4d39ce", "#088eff"];
 
      // Event Listeners
      addEventListener("mousemove", function (event) {
        mouse.x = event.clientX;
        mouse.y = event.clientY;
      });
      addEventListener('touchmove', function (event) {
        event.preventDefault(); // 阻止默认触摸事件行为
        mouse.x = event.touches[0].clientX;
        mouse.y = event.touches[0].clientY;
      });
 
      addEventListener("resize", function () {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
 
        init();
      });
 
      // Utility Functions
      function randomIntFromRange(min, max) {
        return Math.floor(Math.random() * (max - min + 1) + min);
      }
 
      function randomColor(colors) {
        return colors[Math.floor(Math.random() * colors.length)];
      }
 
      // Objects
      function Particle(x, y, radius, color) {
        var _this = this;
 
        var distance = randomIntFromRange(10, 50);
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.color = color;
        this.radians = Math.random() * Math.PI * 2;
        this.velocity = 0.05;
        this.distanceFromCenter = {
          x: distance,
          y: distance,
        };
        this.prevDistanceFromCenter = {
          x: distance,
          y: distance,
        };
        this.lastMouse = { x: x, y: y };
 
        this.update = function () {
          var lastPoint = { x: _this.x, y: _this.y };
          // Move points over time
          _this.radians += _this.velocity;
 
          // Drag effect
          _this.lastMouse.x += (mouse.x - _this.lastMouse.x) * 0.05;
          _this.lastMouse.y += (mouse.y - _this.lastMouse.y) * 0.05;
 
          // Circular Motion
          _this.distanceFromCenter.x =
            _this.prevDistanceFromCenter.x + Math.sin(_this.radians) * 100;
          _this.distanceFromCenter.y =
            _this.prevDistanceFromCenter.x + Math.sin(_this.radians) * 100;
 
          _this.x =
            _this.lastMouse.x +
            Math.cos(_this.radians) * _this.distanceFromCenter.x;
          _this.y =
            _this.lastMouse.y +
            Math.sin(_this.radians) * _this.distanceFromCenter.y;
 
          _this.draw(lastPoint);
        };
 
        this.draw = function (lastPoint) {
          c.beginPath();
          c.strokeStyle = _this.color;
          c.lineWidth = _this.radius;
          c.moveTo(lastPoint.x, lastPoint.y);
          c.lineTo(_this.x, _this.y);
          c.stroke();
          c.closePath();
        };
      }
 
      // Implementation
      var particles = undefined;
      function init() {
        particles = [];
 
        for (var i = 0; i < 50; i++) {
          var radius = Math.random() * 2 + 1;
          particles.push(
            new Particle(
              canvas.width / 2,
              canvas.height / 2,
              radius,
              randomColor(colors)
            )
          );
        }
      }
 
      // Animation Loop
      function animate() {
        requestAnimationFrame(animate);
        c.fillStyle = "rgba(0, 0, 0, 0.05)";
        c.fillRect(0, 0, canvas.width, canvas.height);
 
        particles.forEach(function (particle) {
          particle.update();
        });
      }
 
      init();
      animate();
    </script>
  </body>
</html>
